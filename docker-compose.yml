version: '3.8'

services:
  web:
    build: .
    container_name: app-ia-streamlit
    ports:
      - "8501:8501"
    environment:
      - APP_TITLE=Analyseur de Texte IA
      - APP_VERSION=1.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
